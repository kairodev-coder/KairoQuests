quests:
  daily_miner:
    enabled: true
    display-name: "<gold>Daily Miner"
    description: "Break 250 stone."
    category: DAILY
    type: BREAK_BLOCK
    target: STONE
    amount: 250
    reset-type: DAILY
    reset-interval: 86400
    permission-required: false
    permission: ""
    auto-start: true
    auto-claim: false
    rewards:
      - type: MONEY
        value: "500"
      - type: EXPERIENCE
        value: "250"
      - type: MESSAGE
        value: "<green>You completed %quest_display%."
    gui-material: STONE
    custom-model-data: 0
    lore:
      - "<gray>Break stone anywhere in the world."
      - "<gray>Progress: <green>%quest_progress%</green><dark_gray>/</dark_gray><yellow>%quest_required%</yellow>"
    completion-message: "<green>You finished %quest_display%."
    broadcast-completion: false
    start-actions: []
    complete-actions:
      - "SOUND:ENTITY_PLAYER_LEVELUP"
    claim-actions: []
  daily_hunter:
    enabled: true
    display-name: "<red>Daily Hunter"
    description: "Kill 25 zombies."
